version: '3.9'

services:
  postgres:
    image: postgres:16
    container_name: traineon-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: traineon
      POSTGRES_PASSWORD: traineon
      POSTGRES_DB: traineon
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./pg-init:/docker-entrypoint-initdb.d  # creates traineon_app on first boot
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U traineon']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: traineon-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    container_name: traineon-clickhouse
    restart: unless-stopped
    ports:
      - '8123:8123'   # HTTP interface
      - '9000:9000'   # native TCP
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    environment:
      CLICKHOUSE_DB: traineon
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8123/ping || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: ../../
      dockerfile: infra/docker/Dockerfile
    container_name: traineon-api
    restart: unless-stopped
    environment:
      NODE_ENV: development
      APP_ROLE: api
      PORT: 3000
      DATABASE_URL: postgresql://traineon:traineon@postgres:5432/traineon_app
      REDIS_URL: redis://redis:6379
      CLICKHOUSE_URL: http://clickhouse:8123
      CLICKHOUSE_DATABASE: traineon
      CLICKHOUSE_USERNAME: default
      CLICKHOUSE_PASSWORD: ''
      CREDENTIAL_ENCRYPTION_KEY: dev-credential-encryption-key-min-32
      JWT_ACCESS_SECRET: dev-access-secret-min-32-chars-here
      JWT_REFRESH_SECRET: dev-refresh-secret-min-32-chars-here
      CORS_ORIGINS: http://localhost:5173
      LOG_LEVEL: debug
      CREDENTIAL_VERIFIER: local
    ports:
      - '3000:3000'
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      clickhouse:
        condition: service_healthy
    volumes:
      - ../../apps/api/src:/app/apps/api/src  # hot-reload in dev

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:

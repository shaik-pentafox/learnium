# Traineon infra — STANDALONE, mirrors infra/docker/docker-compose.yml exactly
# (same images, ports, creds, db bootstrap). No repo, no build, no bind mounts.
# Copy this ONE file to the laptop, then:
#   docker compose -f traineon-infra.yml up -d
#
# Published ports (identical to docker-compose.yml):
#   postgres   5432   (default)
#   redis      6379
#   clickhouse 8123 (HTTP) + 9000 (native TCP)
#
# db bootstrap: POSTGRES_DB=traineon (default) + an init script creates
# `traineon_app` (the db the app's DATABASE_URL points at) — same as the
# pg-init/ mount in docker-compose.yml, inlined here via configs.
services:
  postgres:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: traineon
      POSTGRES_PASSWORD: traineon
      POSTGRES_DB: traineon
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    configs:
      - source: pg_init_app_db
        target: /docker-entrypoint-initdb.d/01_create_app_db.sql
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U traineon']
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  clickhouse:
    image: clickhouse/clickhouse-server:24
    restart: unless-stopped
    ports:
      - '8123:8123'
      - '9000:9000'
    environment:
      CLICKHOUSE_DB: traineon
      CLICKHOUSE_USER: default
      CLICKHOUSE_PASSWORD: ''
    volumes:
      - clickhouse_data:/var/lib/clickhouse
    healthcheck:
      test: ['CMD-SHELL', 'wget -qO- http://localhost:8123/ping || exit 1']
      interval: 5s
      timeout: 5s
      retries: 20

configs:
  pg_init_app_db:
    content: |
      CREATE DATABASE traineon_app;

volumes:
  postgres_data:
  redis_data:
  clickhouse_data:
